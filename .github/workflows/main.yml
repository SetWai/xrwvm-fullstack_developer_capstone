name: 'Lint Code'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4 # v3 မှ v4 သို့ ပြောင်းထားပါသည်

    - name: Set up Python
      uses: actions/setup-python@v5 # v4 မှ v5 သို့ ပြောင်းထားပါသည်
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run Linter
      run: |
        # Python file အားလုံးကို ရှာပြီး flake8 နဲ့ lint စစ်ပါမည်
        find . -name "*.py" -exec flake8 {} +
        echo "Linted all the python files successfully"

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install JSHint
      run: npm install jshint --global

    - name: Run Linter
      run: |
        # server/database ထဲရှိ JavaScript file များကို jshint နဲ့ စစ်ပါမည်
        find ./server/database -name "*.js" -exec jshint {} +
        echo "Linted all the js files successfully"